<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueFlow AI | Venue Operations</title>
  <link rel="stylesheet" href="src/components/styles.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c10">
</head>
<body>
  <div id="app">
    <!-- Header Area -->
    <header class="app-header">
      <div class="header-top">
        <div class="logo">VENUEFLOW <span class="accent">AI</span></div>
        <div class="live-indicator"><span class="pulse"></span> System: Simulated</div>
      </div>
      <!-- Mode & Role Selection -->
      <div class="header-bottom">
        <div id="eventModeContainer" class="event-mode-container">
          <!-- Attendees mode tabs injected here -->
        </div>
        <div id="opsModeSelectorWrapper" class="event-mode-container hidden">
          <!-- Ops mode tabs injected here -->
        </div>

        <div class="role-switch">
          <button id="btnAttendee" class="role-btn active" onclick="switchRole('attendee')">Attendee View</button>
          <button id="btnAdmin" class="role-btn" onclick="switchRole('admin')">Admin View</button>
        </div>
      </div>
    </header>

    <!-- Attendee Interface -->
    <main id="attendeeView" class="view active">
      
      <!-- Sticky Hero Section for Best Gate -->
      <section class="hero-section sticky-top">
        <div class="hero-title-row">
          <h2>AI Gate Recommendation</h2>
          <div id="zoneSelectorContainer">
            <!-- Zone Selector injected here -->
          </div>
        </div>
        <div id="gateCard" class="info-card hero-card">
          <!-- Populated by JS -->
        </div>
      </section>

      <div class="content-scroll container-padding">
        <section class="cards-section">
          <h2 class="section-heading">Live Alerts &amp; Route Guidance</h2>
          <div id="alertCards" class="card-grid alert-grid"></div>
        </section>

        <section class="cards-section" style="margin-top: 32px;">
          <h2 class="section-heading">Nearby Facilities</h2>
          <div id="facilitiesCards" class="card-grid"></div>
        </section>
      </div>

    </main>

    <!-- Admin Unified Interface -->
    <main id="adminView" class="view container-padding">
      
      <section class="cards-section">
        <h2 class="section-heading">Venue Overview KPIs</h2>
        <div id="overviewCards" class="card-grid kpi-grid"></div>
      </section>

      <div class="admin-columns">
        <!-- Column 1: Maps & Ops Alerts -->
        <div class="admin-col">
          <section class="cards-section">
            <h2 class="section-heading">Zone Congestion Map</h2>
            <div id="zoneCards" class="card-grid col-grid"></div>
          </section>
          <section class="cards-section">
            <h2 class="section-heading">Ops Alerts & Action Panel</h2>
            <div id="opsAlertCards" class="card-grid col-grid"></div>
          </section>
        </div>

        <!-- Column 2: Queue Board -->
        <div class="admin-col">
          <section class="cards-section">
            <h2 class="section-heading">Live Queue Board</h2>
            <div id="queueCards" class="card-grid queue-board"></div>
          </section>
        </div>
      </div>

      <hr class="admin-divider"/>

      <!-- Local Overrides -->
      <section class="cards-section">
        <div class="section-header-row">
          <h2 class="section-heading">Local Operations Console</h2>
          <button class="action-btn danger-btn" onclick="resetAdminData()">Clear Overrides & Sync</button>
        </div>
        
        <h3 class="sub-heading">Gate Controls</h3>
        <div id="adminGatesCards" class="card-grid console-grid"></div>
        
        <h3 class="sub-heading" style="margin-top:24px;">Facility Controls</h3>
        <div id="adminFacCards" class="card-grid console-grid"></div>
      </section>

    </main>
  </div>

  <script src="src/data/eventData.js"></script>
  <script src="src/data/gateData.js"></script>
  <script src="src/data/zoneData.js"></script>
  <script src="src/data/facilityData.js"></script>
  <script src="src/data/alertData.js"></script>
  <script src="src/logic/recommendationLogic.js"></script>
  <script src="src/services/venueService.js"></script>
  <script src="src/utils/helpers.js"></script>
  <script src="src/screens/attendeeScreen.js"></script>
  <script src="src/screens/opsScreen.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
